# ─────────────────────────────────────
# Best-of-N Baseline
# ─────────────────────────────────────
# The simplest strategy. Generate N independent solutions.
# Use this as baseline for all comparisons.

name: best_of_n_baseline
strategy: best_of_n
model: deepseek-coder-v2

# Generate 16 independent samples
max_generations: 16
temperature: 0.8
temperature_range: [0.2, 1.0]  # Diverse temperatures for diversity

# Verifier weights
compilation_weight: 0.15
test_weight: 0.50
ast_weight: 0.15
lint_weight: 0.10
prm_weight: 0.10

# Stop if correct solution found
stop_on_correct: true
timeout_seconds: 10.0
