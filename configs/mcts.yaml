# ─────────────────────────────────────
# MCTS with Execution-Grounded Verifier
# ─────────────────────────────────────
# Most sophisticated strategy.
# UCB1-guided exploration with execution feedback.
# Ref: SWE-Search (Antoniades et al. 2024)

name: mcts_full
strategy: mcts
model: deepseek-coder-v2

max_generations: 32      # Higher budget for MCTS
branching_factor: 3      # 3 children per expansion
max_depth: 5             # Deep search tree
temperature: 0.8
temperature_range: [0.2, 1.2]

# Verifier weights
compilation_weight: 0.15
test_weight: 0.45
ast_weight: 0.15
lint_weight: 0.10
prm_weight: 0.15         # PRM matters more for MCTS (guides exploration)

stop_on_correct: true
min_confidence: 0.95
timeout_seconds: 10.0
