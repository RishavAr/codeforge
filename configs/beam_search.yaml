# ─────────────────────────────────────
# Beam Search with Execution Feedback
# ─────────────────────────────────────
# Iterative refinement: generate → execute → refine → repeat
# Keeps top-k candidates at each depth level.

name: beam_search_refined
strategy: beam_search
model: deepseek-coder-v2

max_generations: 16
beam_width: 4           # Keep top 4 candidates per level
max_depth: 4            # Max refinement iterations
temperature: 0.7
temperature_range: [0.3, 0.9]

# Verifier weights (same budget, better allocation)
compilation_weight: 0.15
test_weight: 0.50
ast_weight: 0.15
lint_weight: 0.10
prm_weight: 0.10

stop_on_correct: true
timeout_seconds: 10.0
